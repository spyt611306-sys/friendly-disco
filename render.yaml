services:
  - type: web
    name: friendly-disco
    env: python
    plan: free
    rootDir: project
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STRICT_STARTUP
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://marinesalesbyminsu.netlify.app,http://localhost:8000,http://127.0.0.1:8000
      - key: DATABASE_URL
        sync: false
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: PUBLIC_DATA_API_KEY
        sync: false
      - key: SHIP_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: VERIFY_AFTER_COLLECT
        value: "true"
      - key: VERIFY_MAX_PROJECTS
        value: "30"
      - key: GOOGLE_NEWS_VERIFY_ENABLED
        value: "true"
      - key: NEWS_RSS_FEEDS
        sync: false
      - key: PUBLIC_NOTICE_RSS_FEEDS
        sync: false
      - key: COLLECTOR_TIMEOUT_SECONDS
        value: "300"
      - key: G2B_WINDOW_DAYS
        value: "30"
      - key: BID_LOOKBACK_DAYS
        value: "365"
      - key: CONTRACT_LOOKBACK_DAYS
        value: "365"
      - key: PRESPEC_LOOKBACK_DAYS
        value: "365"
      - key: AWARD_LOOKBACK_DAYS
        value: "180"
      - key: PUBLIC_DATA_LOOKBACK_DAYS
        value: "30"
      - key: ORDER_PLAN_LOOKBACK_MONTHS
        value: "6"
      - key: DEFAULT_PIPELINE_ALIASES
        value: bid,contract,award,prespec,order_plan,public_data,news,public_notice,ship_support
      - key: MAX_PAGES_PER_OPERATION
        value: "10"
      - key: MAX_ITEMS_PER_OPERATION
        value: "1000"
