services:
  - type: web
    name: friendly-disco
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: https://marinesales.netlify.app,https://marinesalesbyminsu.netlify.app,http://localhost:8000,http://127.0.0.1:8000
      - key: COLLECT_TASK_TIMEOUT_SECONDS
        value: 180
      - key: DATABASE_URL
        sync: false
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: PUBLIC_DATA_API_KEY
        sync: false
      - key: SHIP_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BID_LOOKBACK_DAYS
        value: 180
      - key: CONTRACT_LOOKBACK_DAYS
        value: 180
      - key: PRESPEC_LOOKBACK_DAYS
        value: 180
      - key: PUBLIC_DATA_LOOKBACK_DAYS
        value: 30
      - key: ORDER_PLAN_LOOKBACK_MONTHS
        value: 6
      - key: DEFAULT_PIPELINE_ALIASES
        value: bid,contract,prespec,order_plan,ship_support
      - key: MAX_PAGES_PER_OPERATION
        value: 10
      - key: MAX_ITEMS_PER_OPERATION
        value: 1000
      - key: SHIP_SUPPORT_VSSL_NAMES
        value: 군산실습선,해림2호,우도차도선,동해행정선,군산청항선,3019함,3020함
