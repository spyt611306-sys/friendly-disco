services:
  - type: web
    name: friendly-disco
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: https://marinesales.netlify.app,http://localhost:8000,http://127.0.0.1:8000
      - key: COLLECT_TASK_TIMEOUT_SECONDS
        value: 180
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_DATA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
